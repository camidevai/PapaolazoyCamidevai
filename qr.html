<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>influencersTemuco — QR</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #050508;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      -webkit-font-smoothing: antialiased;
    }

    .qr-box {
      background: #fff;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 60px rgba(99,102,241,0.3);
    }

    #qrcode canvas, #qrcode img { display: block; border-radius: 6px; }

    .label {
      text-align: center;
      line-height: 1.3;
    }

    .label-name {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .label-scan {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255,255,255,0.35);
      margin-top: 6px;
      letter-spacing: 0.5px;
    }

    @media print {
      body { background: #fff; }
      .label-name { -webkit-text-fill-color: #000; color: #000; }
      .label-scan  { color: #666; }
      .qr-box { box-shadow: none; border: 1px solid #ddd; }
    }
  </style>
</head>
<body>

  <div class="qr-box">
    <div id="qrcode"></div>
  </div>

  <div class="label">
    <div class="label-name">influencersTemuco</div>
    <div class="label-scan">Scaneame</div>
  </div>

  <script>
    const LANDING_URL = 'https://influencerstemuco.netlify.app';

    new QRCode(document.getElementById('qrcode'), {
      text:         LANDING_URL,
      width:        220,
      height:       220,
      colorDark:    '#000000',
      colorLight:   '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
